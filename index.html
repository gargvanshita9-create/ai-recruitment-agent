<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shortlist — AI Recruitment Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F8; --panel:#FFFFFF; --ink:#15171C; --muted:#667085;
    --line:#E6E8EC; --line-soft:#EFF1F4;
    --accent:#4338CA; --accent-ink:#FFFFFF; --accent-soft:#EEEFFE;
    --good:#0E9F6E; --good-soft:#E6F6F0;
    --hold:#B45309; --hold-soft:#FCF1E2;
    --bad:#DC2626; --bad-soft:#FCEBEB;
    --radius:14px; --shadow:0 1px 2px rgba(16,24,40,.05),0 8px 24px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  .app{display:grid;grid-template-columns:268px 1fr;min-height:100vh}

  /* ---- Sidebar ---- */
  .side{border-right:1px solid var(--line);background:var(--panel);padding:20px 16px;display:flex;flex-direction:column;gap:22px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px}
  .mark{width:30px;height:30px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;font-family:"Bricolage Grotesque";font-weight:700;font-size:17px}
  .brand h1{font-family:"Bricolage Grotesque";font-size:19px;margin:0;letter-spacing:-.01em}
  .brand small{display:block;color:var(--muted);font-size:11px;font-weight:500;margin-top:1px}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:0;background:none;color:var(--muted);font:inherit;font-weight:500;padding:9px 10px;border-radius:9px;cursor:pointer}
  .nav button:hover{background:var(--line-soft);color:var(--ink)}
  .nav button.on{background:var(--accent-soft);color:var(--accent)}
  .nav .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.55}
  .side h2{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:0 0 8px}
  .hist-item{border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:7px;cursor:pointer;background:var(--panel)}
  .hist-item:hover{border-color:var(--accent);background:var(--accent-soft)}
  .hist-item span{color:var(--muted);font-size:11px}
  .hist-item b{display:block;font-size:12.5px;font-weight:600}
  .hist-empty{color:var(--muted);font-size:12px;font-style:italic}
  .side-foot{margin-top:auto;font-size:11px;color:var(--muted);line-height:1.45}

  /* ---- Main ---- */
  .main{padding:28px 32px 64px;max-width:920px}
  .head{margin-bottom:20px}
  .head h2{font-family:"Bricolage Grotesque";font-size:26px;margin:0 0 4px;letter-spacing:-.015em}
  .head p{margin:0;color:var(--muted)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
  label{display:block;font-weight:600;font-size:12.5px;margin:0 0 6px}
  .hint{font-weight:400;color:var(--muted)}
  textarea,input[type=text],select{
    width:100%;font:inherit;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;resize:vertical;
  }
  textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:14px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:10px}
  .seg button{border:0;background:#fff;font:inherit;font-weight:500;color:var(--muted);padding:7px 13px;cursor:pointer;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--accent);color:#fff}
  .upload-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .upload-row input[type=file]{font:inherit;font-size:12.5px;color:var(--muted)}
  .err-text{color:var(--bad)}
  .checks{display:flex;flex-wrap:wrap;gap:8px}
  .chk{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:7px 11px;cursor:pointer;font-weight:500;user-select:none}
  .chk input{accent-color:var(--accent)}
  .chk.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:0;font:inherit;font-weight:600;padding:11px 18px;border-radius:10px;cursor:pointer}
  .btn:hover{filter:brightness(1.06)}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);padding:7px 12px;font-weight:500}
  .btn.ghost:hover{background:var(--line-soft);filter:none}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---- Results ---- */
  .result{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .res-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:6px}
  .ring{--p:0;width:104px;height:104px;border-radius:50%;flex:none;
    background:conic-gradient(var(--ring,var(--accent)) calc(var(--p)*1%),var(--line-soft) 0);
    display:grid;place-items:center}
  .ring::before{content:"";position:absolute;width:78px;height:78px;border-radius:50%;background:#fff}
  .ring{position:relative}
  .ring b{position:relative;font-family:"JetBrains Mono";font-weight:700;font-size:26px;line-height:1}
  .ring small{position:relative;display:block;text-align:center;color:var(--muted);font-size:10px;letter-spacing:.05em;margin-top:2px}
  .badge{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12px;padding:5px 11px;border-radius:999px}
  .badge.good{background:var(--good-soft);color:var(--good)}
  .badge.hold{background:var(--hold-soft);color:var(--hold)}
  .badge.bad{background:var(--bad-soft);color:var(--bad)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 0}
  .tag{font-size:12px;padding:4px 9px;border-radius:7px;background:var(--line-soft)}
  .tag.miss{background:var(--bad-soft);color:var(--bad)}
  .tag.hit{background:var(--good-soft);color:var(--good)}
  .block{margin-top:16px}
  .block h4{font-family:"Bricolage Grotesque";font-size:14px;margin:0 0 8px;letter-spacing:-.01em}
  .qlist{margin:0;padding-left:18px}
  .qlist li{margin-bottom:7px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:10px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  td .score{font-family:"JetBrains Mono";font-weight:700}
  .rank{font-family:"JetBrains Mono";color:var(--muted)}
  .email pre{white-space:pre-wrap;font:inherit;margin:0}
  .email .subj{font-weight:600;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--line-soft)}
  .copy{cursor:pointer}
  .err{background:var(--bad-soft);color:var(--bad);border-radius:10px;padding:12px 14px;font-size:13px}
  .muted{color:var(--muted)}
  @media (max-width:760px){.app{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:column}.row{grid-template-columns:1fr}.main{padding:20px}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="brand">
      <div class="mark">S</div>
      <div><h1>Shortlist</h1><small>AI Recruitment Agent · Grok</small></div>
    </div>

    <nav class="nav" id="nav">
      <button data-tab="screen" class="on"><span class="dot"></span>Screen CV</button>
      <button data-tab="rank"><span class="dot"></span>Score &amp; Rank</button>
      <button data-tab="qs"><span class="dot"></span>Interview Questions</button>
      <button data-tab="email"><span class="dot"></span>Shortlist Email</button>
    </nav>

    <div>
      <h2>Recent</h2>
      <div id="histList"><div class="hist-empty">Nothing yet.</div></div>
    </div>

    <div class="side-foot">
      Powered by Grok&nbsp;4.3. Your key stays on the server — never in this page.
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<script>
/* ---------------------------------------------------------------------------
   History persists in the browser; no job descriptions are bundled with the
   app — they're pasted or uploaded each time.
--------------------------------------------------------------------------- */
let history = JSON.parse(localStorage.getItem("history") || "[]");

/* ---------------------------------------------------------------------------
   Grok call — goes to our own /api/grok function (no key in the browser).
--------------------------------------------------------------------------- */
async function grok(system, user, { json=false, temperature=0.3 }={}) {
  const messages = [];
  if (system) messages.push({ role:"system", content:system });
  messages.push({ role:"user", content:user });
  const res = await fetch("/api/grok", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ messages, temperature }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  let text = data.text || "";
  if (json) {
    const m = text.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
    if (m) { try { return JSON.parse(m[0]); } catch(e){} }
    throw new Error("Could not parse a structured response. Raw output:\n\n" + text);
  }
  return text;
}

/* ---------- helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const esc = s => (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function recClass(r){ r=(r||"").toLowerCase(); if(r.includes("short"))return"good"; if(r.includes("reject")||r.includes("no"))return"bad"; return"hold"; }
function ringColor(s){ return s>=70?"var(--good)":s>=45?"var(--hold)":"var(--bad)"; }
function copyBtn(getText){
  const b=document.createElement("button"); b.className="btn ghost copy"; b.textContent="Copy";
  b.onclick=async()=>{ await navigator.clipboard.writeText(getText()); b.textContent="Copied"; setTimeout(()=>b.textContent="Copy",1200); };
  return b;
}
function addHistory(tab,label){
  history.unshift({ tab,label,at:Date.now() });
  history = history.slice(0,12);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}
function renderHistory(){
  const el=$("#histList");
  if(!history.length){ el.innerHTML='<div class="hist-empty">Nothing yet.</div>'; return; }
  el.innerHTML = history.map(h=>{
    const t={screen:"Screen CV",rank:"Score & Rank",qs:"Interview Qs",email:"Email"}[h.tab];
    return `<div class="hist-item"><b>${esc(h.label)}</b><span>${t}</span></div>`;
  }).join("");
}

/* ---------------------------------------------------------------------------
   Tabs
--------------------------------------------------------------------------- */
let activeJDSource = "paste";
const tabs = { screen:renderScreen, rank:renderRank, qs:renderQs, email:renderEmail };
let current = "screen";

$("#nav").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  current=b.dataset.tab;
  [...$("#nav").children].forEach(x=>x.classList.toggle("on",x===b));
  tabs[current]();
});

/* ---------------------------------------------------------------------------
   File upload — sends PDF / DOCX / text to /api/extract and returns the text.
--------------------------------------------------------------------------- */
function readAsBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(String(r.result));
    r.onerror=()=>reject(new Error("Could not read the file."));
    r.readAsDataURL(file);
  });
}
async function extractFile(file){
  const data=await readAsBase64(file);
  const res=await fetch("/api/extract",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ filename:file.name, contentType:file.type, data }),
  });
  const out=await res.json();
  if(!res.ok) throw new Error(out.error || "Could not extract text from that file.");
  return out.text || "";
}

/* ---------------------------------------------------------------------------
   1) SCREEN CV
--------------------------------------------------------------------------- */
function renderScreen(){
  const m=$("#main");
  m.innerHTML=`
    <div class="head"><h2>Screen CV against a JD</h2>
      <p>Match a candidate to a role and get a fit score, gaps, and a recommendation.</p></div>
    <div class="card">
      <label>Job description</label>
      <div class="seg" id="jdSeg">
        <button data-s="paste">Paste</button>
        <button data-s="upload">Upload</button>
      </div>
      <div id="jdArea"></div>
    </div>
    <div class="card">
      <label>Candidate CV <span class="hint">— paste the text or upload a PDF / DOCX</span></label>
      <div class="upload-row">
        <input type="file" id="cvFile" accept=".pdf,.docx,.txt,.md,.json"/>
        <span class="muted" id="cvFileMsg"></span>
      </div>
      <textarea id="cv" rows="8" placeholder="Paste the candidate's CV / résumé here…"></textarea>
    </div>
    <button class="btn" id="run">Screen candidate</button>
    <div id="out"></div>`;

  const seg=$("#jdSeg");
  seg.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.s===activeJDSource));
  seg.onclick=e=>{const b=e.target.closest("button");if(!b)return;activeJDSource=b.dataset.s;renderScreen();};
  paintJDArea();
  wireFileInput($("#cvFile"), $("#cv"), $("#cvFileMsg"));

  $("#run").onclick=runScreen;
}
/* Wire a file <input> to fill a target field via /api/extract, with status. */
function wireFileInput(input, target, msgEl){
  if(!input) return;
  input.onchange=async ev=>{
    const f=ev.target.files[0]; if(!f) return;
    if(msgEl){ msgEl.textContent="Extracting text…"; msgEl.classList.remove("err-text"); }
    try{
      const text=await extractFile(f);
      target.value=text;
      if(msgEl) msgEl.textContent=`Loaded ${f.name} (${text.length.toLocaleString()} chars).`;
    }catch(err){
      if(msgEl){ msgEl.textContent=err.message; msgEl.classList.add("err-text"); }
    }
  };
}
function paintJDArea(){
  const a=$("#jdArea"); if(!a)return;
  if(activeJDSource==="paste"){
    a.innerHTML=`<textarea id="jdPaste" rows="6" placeholder="Paste the job description here…"></textarea>`;
  } else {
    a.innerHTML=`<div class="upload-row">
        <input type="file" id="jdFile" accept=".pdf,.docx,.txt,.md,.json"/>
        <span class="muted" id="jdFileMsg"></span>
      </div>
      <div class="block muted" style="font-size:12px">PDF, DOCX, or plain text. Scanned image-only PDFs have no text to extract — paste those instead.</div>
      <textarea id="jdPaste" rows="4" style="margin-top:10px" placeholder="…or paste here"></textarea>`;
    wireFileInput($("#jdFile"), $("#jdPaste"), $("#jdFileMsg"));
  }
}
function getJDText(){
  return ($("#jdPaste")?.value||"").trim();
}
async function runScreen(){
  const jd=getJDText(), cv=$("#cv").value.trim();
  if(!jd||!cv){ $("#out").innerHTML=`<div class="card err">Add both a job description and a CV.</div>`; return; }
  const btn=$("#run"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Screening…';
  $("#out").innerHTML="";
  try{
    const data=await grok(
      "You are an expert technical recruiter. Reply with ONLY a JSON object, no prose, no markdown fences.",
      `Screen this candidate against the job description.

JOB DESCRIPTION:
${jd}

CANDIDATE CV:
${cv}

Return JSON exactly:
{"score":0-100 integer fit score,
"recommendation":"Shortlist"|"Hold"|"Reject",
"summary":"2-3 sentence verdict",
"matching":["skills/experience that match"],
"gaps":["missing or weak areas"],
"questions":["4-6 probing interview questions targeting the gaps and verifying claims"]}`,
      { json:true }
    );
    renderScreenResult(data);
    addHistory("screen", (cv.split("\n")[0]||"Candidate").slice(0,32));
  }catch(err){ $("#out").innerHTML=`<div class="card err">${esc(err.message)}</div>`; }
  btn.disabled=false; btn.textContent="Screen candidate";
}
function renderScreenResult(d){
  const score=Math.max(0,Math.min(100,parseInt(d.score)||0));
  const rc=recClass(d.recommendation);
  const out=$("#out");
  out.innerHTML=`<div class="card result">
    <div class="res-head">
      <div>
        <span class="badge ${rc}">${esc(d.recommendation||"Hold")}</span>
        <p style="margin:10px 0 0;max-width:560px">${esc(d.summary||"")}</p>
      </div>
      <div class="ring" style="--p:${score};--ring:${ringColor(score)}"><b>${score}</b><small>FIT</small></div>
    </div>
    <div class="block"><h4>Matching strengths</h4>
      <div class="tags">${(d.matching||[]).map(x=>`<span class="tag hit">${esc(x)}</span>`).join("")||'<span class="muted">None noted</span>'}</div></div>
    <div class="block"><h4>Gaps &amp; risks</h4>
      <div class="tags">${(d.gaps||[]).map(x=>`<span class="tag miss">${esc(x)}</span>`).join("")||'<span class="muted">None noted</span>'}</div></div>
    <div class="block"><h4>Probing questions</h4>
      <ol class="qlist">${(d.questions||[]).map(q=>`<li>${esc(q)}</li>`).join("")}</ol></div>
  </div>`;
  const txt=`Fit: ${score}/100 — ${d.recommendation}\n${d.summary}\n\nMatching: ${(d.matching||[]).join(", ")}\nGaps: ${(d.gaps||[]).join(", ")}\n\nQuestions:\n${(d.questions||[]).map((q,i)=>`${i+1}. ${q}`).join("\n")}`;
  const bar=document.createElement("div"); bar.style.marginTop="14px"; bar.appendChild(copyBtn(()=>txt));
  out.firstElementChild.appendChild(bar);
}

/* ---------------------------------------------------------------------------
   2) SCORE & RANK
--------------------------------------------------------------------------- */
function renderRank(){
  $("#main").innerHTML=`
    <div class="head"><h2>Score &amp; rank candidates</h2>
      <p>Drop in several candidates and get a ranked shortlist out of 100.</p></div>
    <div class="card">
      <div class="field"><label>Role / requirement <span class="hint">— optional context</span></label>
        <textarea id="role" rows="2" placeholder="e.g. Python SDET, 4-7 yrs, BFSI…"></textarea></div>
      <label>Candidates <span class="hint">— one per line: name — skills, years</span></label>
      <textarea id="cands" rows="8" placeholder="Asha R — Python, PyTest, Selenium, REST, 5 yrs&#10;Vikram S — Java, TestNG, 6 yrs, some Python&#10;Neha P — Manual QA moving to automation, 3 yrs"></textarea>
    </div>
    <button class="btn" id="run">Rank candidates</button>
    <div id="out"></div>`;
  $("#run").onclick=runRank;
}
async function runRank(){
  const role=$("#role").value.trim(), cands=$("#cands").value.trim();
  if(!cands){ $("#out").innerHTML=`<div class="card err">Add at least one candidate.</div>`; return; }
  const btn=$("#run"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Ranking…'; $("#out").innerHTML="";
  try{
    const data=await grok(
      "You are an expert technical recruiter. Reply with ONLY a JSON array, no prose, no markdown fences.",
      `Rank these candidates${role?` for: ${role}`:""}.

CANDIDATES:
${cands}

Return a JSON array sorted best-first:
[{"name":"...","score":0-100 integer,"match":"Strong"|"Good"|"Partial"|"Weak","notes":"one-line rationale"}]`,
      { json:true, temperature:0.2 }
    );
    renderRankResult(Array.isArray(data)?data:[]);
    addHistory("rank", `${(Array.isArray(data)?data.length:0)} candidates`);
  }catch(err){ $("#out").innerHTML=`<div class="card err">${esc(err.message)}</div>`; }
  btn.disabled=false; btn.textContent="Rank candidates";
}
function renderRankResult(rows){
  const out=$("#out");
  out.innerHTML=`<div class="card result">
    <table><thead><tr><th>#</th><th>Candidate</th><th>Score</th><th>Match</th><th>Notes</th></tr></thead>
    <tbody>${rows.map((r,i)=>{
      const s=parseInt(r.score)||0;
      return `<tr><td class="rank">${i+1}</td><td><b>${esc(r.name||"")}</b></td>
        <td class="score" style="color:${ringColor(s)}">${s}</td>
        <td>${esc(r.match||"")}</td><td class="muted">${esc(r.notes||"")}</td></tr>`;
    }).join("")}</tbody></table></div>`;
  const txt=rows.map((r,i)=>`${i+1}. ${r.name} — ${r.score}/100 (${r.match}) — ${r.notes}`).join("\n");
  const bar=document.createElement("div"); bar.style.marginTop="14px"; bar.appendChild(copyBtn(()=>txt));
  out.firstElementChild.appendChild(bar);
}

/* ---------------------------------------------------------------------------
   3) INTERVIEW QUESTIONS
--------------------------------------------------------------------------- */
const QTYPES=["Technical","Behavioural","Situational","Salary & Notice"];
let pickedTypes=new Set(["Technical","Behavioural"]);
function renderQs(){
  $("#main").innerHTML=`
    <div class="head"><h2>Interview questions</h2>
      <p>Targeted questions with notes on what a strong answer covers.</p></div>
    <div class="card">
      <div class="row">
        <div class="field"><label>Role</label><input type="text" id="role" placeholder="e.g. Salesforce LWC Developer"/></div>
        <div class="field"><label>Candidate <span class="hint">— optional</span></label><input type="text" id="cand" placeholder="e.g. Asha R"/></div>
      </div>
      <div class="field"><label>Question types</label><div class="checks" id="types"></div></div>
      <div class="field" style="max-width:180px"><label>Per type</label>
        <select id="count"><option>3</option><option selected>4</option><option>5</option><option>6</option></select></div>
    </div>
    <button class="btn" id="run">Generate questions</button>
    <div id="out"></div>`;
  const t=$("#types");
  t.innerHTML=QTYPES.map(q=>`<label class="chk ${pickedTypes.has(q)?"on":""}"><input type="checkbox" ${pickedTypes.has(q)?"checked":""} value="${q}">${q}</label>`).join("");
  t.querySelectorAll(".chk").forEach(l=>{
    const inp=l.querySelector("input");
    inp.onchange=()=>{ inp.checked?pickedTypes.add(inp.value):pickedTypes.delete(inp.value); l.classList.toggle("on",inp.checked); };
  });
  $("#run").onclick=runQs;
}
async function runQs(){
  const role=$("#role").value.trim(), cand=$("#cand").value.trim(), count=$("#count").value;
  if(!role){ $("#out").innerHTML=`<div class="card err">Enter a role.</div>`; return; }
  if(!pickedTypes.size){ $("#out").innerHTML=`<div class="card err">Pick at least one question type.</div>`; return; }
  const btn=$("#run"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Generating…'; $("#out").innerHTML="";
  try{
    const text=await grok(
      "You are an expert interviewer. Be specific and senior. Use clear markdown headings per category.",
      `Generate ${count} interview questions per category for the role "${role}"${cand?` (candidate: ${cand})`:""}.
Categories: ${[...pickedTypes].join(", ")}.
For each question add a short italic note: what a strong answer should cover.`,
      { temperature:0.5 }
    );
    const out=$("#out");
    out.innerHTML=`<div class="card result" id="qres"></div>`;
    $("#qres").innerHTML = mdToHtml(text);
    const bar=document.createElement("div"); bar.style.marginTop="14px"; bar.appendChild(copyBtn(()=>text));
    $("#qres").appendChild(bar);
    addHistory("qs", role.slice(0,32));
  }catch(err){ $("#out").innerHTML=`<div class="card err">${esc(err.message)}</div>`; }
  btn.disabled=false; btn.textContent="Generate questions";
}

/* ---------------------------------------------------------------------------
   tiny markdown renderer (headings, bold, italics, lists)
--------------------------------------------------------------------------- */
function mdToHtml(md){
  const lines=esc(md).split("\n"); let html="",inList=false;
  const inline=s=>s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/_(.+?)_/g,"<em>$1</em>");
  for(let l of lines){
    if(/^#{1,3}\s/.test(l)){ if(inList){html+="</ul>";inList=false;} html+=`<h4>${inline(l.replace(/^#+\s/,""))}</h4>`; }
    else if(/^\s*[-*]\s/.test(l)||/^\s*\d+\.\s/.test(l)){ if(!inList){html+='<ul class="qlist">';inList=true;} html+=`<li>${inline(l.replace(/^\s*([-*]|\d+\.)\s/,""))}</li>`; }
    else if(l.trim()===""){ if(inList){html+="</ul>";inList=false;} }
    else html+=`<p>${inline(l)}</p>`;
  }
  if(inList)html+="</ul>";
  return html;
}
